name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  AWS_DEFAULT_REGION: ap-northeast-1
  SAM_CLI_TELEMETRY: 0

jobs:
  test-and-build:
    name: Test and SAM build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.17.0'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.14'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Node dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate SAM template
        run: uv run sam validate

      - name: Build SAM application
        run: uv run sam build
